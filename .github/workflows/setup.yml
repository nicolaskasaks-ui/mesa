  - name: Create app pages
    run: |
      cat > src/app/page.js << 'APPEOF'
      'use client';
      import{useState,useEffect}from'react';import{supabase}from'@/lib/supabase';import{ALLERGIES,isEnglish}from'@/lib/menu-data';import MenuOverlay from'@/components/MenuOverlay';
      export default function CustomerPage(){const[step,setStep]=useState('welcome');const[name,setName]=useState('');const[party,setParty]=useState(2);const[selectedAllergies,setSelectedAllergies]=useState([]);const[entryId,setEntryId]=useState(null);const[position,setPosition]=useState(null);const[status,setStatus]=useState('waiting');const[showMenu,setShowMenu]=useState(false);const en=typeof window!=='undefined'&&isEnglish();
      useEffect(()=>{const s=typeof window!=='undefined'&&localStorage.getItem('mesa_entry_id');if(s){setEntryId(s);setStep('waiting')}},[]);
      useEffect(()=>{if(!entryId)return;const fp=async()=>{const{data}=await supabase.from('waitlist').select('id,status').in('status',['waiting','notified','extended']).order('joined_at',{ascending:true});if(data){const idx=data.findIndex(e=>e.id===entryId);if(idx>=0){setPosition(idx+1);setStatus(data[idx].status)}else{const{data:entry}=await supabase.from('waitlist').select('status').eq('id',entryId).single();if(entry&&entry.status==='seated')setStep('done')}}};fp();const ch=supabase.channel('wl').on('postgres_changes',{event:'*',schema:'public',table:'waitlist'},()=>fp()).subscribe();return()=>supabase.removeChannel(ch)},[entryId]);
      const join=async()=>{const res=await fetch('/api/waitlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest_name:name,party_size:party,allergies:selectedAllergies,source:'qr'})});const d=await res.json();if(d.id){setEntryId(d.id);localStorage.setItem('mesa_entry_id',d.id);setStep('waiting')}};
      const cancel=async()=>{await fetch('/api/waitlist',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:entryId,action:'cancel'})});localStorage.removeItem('mesa_entry_id');setStep('welcome');setEntryId(null)};
      const toggle=id=>setSelectedAllergies(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id]);
      const wait=position?position*7:null;
      const S={center:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 24px',background:'#fff'},page:{minHeight:'100vh',background:'#F6F6F4',padding:'56px 20px 100px',maxWidth:'430px',margin:'0 auto'},card:{background:'#fff',borderRadius:'16px',padding:'16px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:'12px'},h1:{fontSize:'28px',fontWeight:'700',color:'#1B1B1B',margin:'0 0 4px'},h2:{fontSize:'20px',fontWeight:'600',color:'#1B1B1B',margin:'0 0 8px'},sub:{fontSize:'14px',color:'#6F6F6F',margin:0},body:{fontSize:'15px',color:'#6F6F6F',lineHeight:1.5,margin:0},lbl:{fontSize:'13px',fontWeight:'600',color:'#9B9B9B',marginBottom:'8px',display:'block'},inp:{width:'100%',padding:'14px 16px',background:'#F6F6F4',border:'1.5px solid #EBEBEB',borderRadius:'12px',color:'#1B1B1B',fontSize:'16px',outline:'none',boxSizing:'border-box'},chip:{flex:1,padding:'14px 0',borderRadius:'12px',fontSize:'16px',fontWeight:'600',cursor:'pointer',border:'none',textAlign:'center'},btn:{width:'100%',padding:'15px 24px',border:'none',borderRadius:'12px',fontSize:'16px',fontWeight:'600',cursor:'pointer',background:'#2D7A4F',color:'#fff',marginTop:'8px'},link:{width:'100%',padding:'12px',background:'none',border:'none',color:'#9B9B9B',fontSize:'14px',cursor:'pointer',marginTop:'4px',textAlign:'center',display:'block'}};
      if(step==='welcome')return(<div style={S.center}><div style={S.card}><div style={{fontSize:'36px',marginBottom:'16px'}}>🌿</div><h1 style={S.h1}>Chuí</h1><p style={S.sub}>Loyola 1250, Villa Crespo</p><div style={{height:'16px'}}/><h2 style={S.h2}>{en?'All tables are taken':'Todas las mesas ocupadas'}</h2><p style={S.body}>{en?"Join the list and we'll text you when ready.":'Anotate y te avisamos cuando tu mesa esté lista.'}</p></div><div style={{maxWidth:'340px',width:'100%'}}><button style={S.btn} onClick={()=>setStep('form')}>{en?'Join the waitlist':'Anotarme en la fila'}</button><button style={S.link} onClick={()=>setShowMenu(true)}>{en?'View menu':'Ver el menú mientras tanto'}</button></div>{showMenu&&<MenuOverlay onClose={()=>setShowMenu(false)}/>}</div>);
      if(step==='form')return(<div style={S.page}><h1 style={S.h1}>{en?'Waitlist':'Lista de espera'}</h1><p style={{...S.sub,marginBottom:'24px'}}>Chuí · Loyola 1250</p><div style={S.card}><label style={S.lbl}>{en?'Your name':'Tu nombre'}</label><input value={name} onChange={e=>setName(e.target.value)} placeholder={en?'Name':'Nombre'} style={S.inp} autoFocus/></div><div style={S.card}><label style={S.lbl}>{en?'Party size':'¿Cuántos son?'}</label><div style={{display:'flex',gap:'8px'}}>{[1,2,3,4,5,6].map(n=>(<button key={n} onClick={()=>setParty(n)} style={{...S.chip,background:party===n?'#2D7A4F':'#F6F6F4',border:`1.5px solid ${party===n?'#2D7A4F':'#EBEBEB'}`,color:party===n?'#fff':'#6F6F6F'}}>{n}{n===6?'+':''}</button>))}</div></div><button style={{...S.btn,opacity:name?1:0.5}} disabled={!name} onClick={()=>setStep('allergies')}>{en?'Continue':'Continuar'}</button></div>);
      if(step==='allergies')return(<div style={S.page}><div style={{textAlign:'center',marginBottom:'28px'}}><div style={{fontSize:'32px',marginBottom:'12px'}}>🍽️</div><h2 style={S.h2}>{en?'Any food allergies?':'¿Tenés alergias alimentarias?'}</h2><p style={S.body}>{en?"We'll inform your server.":'Se lo informamos al camarero.'}</p></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'24px'}}>{ALLERGIES.map(a=>{const sel=selectedAllergies.includes(a.id);return(<div key={a.id} onClick={()=>toggle(a.id)} style={{...S.card,cursor:'pointer',display:'flex',alignItems:'center',gap:'12px',marginBottom:0,padding:'16px',border:sel?'2px solid #2D7A4F':'2px solid transparent',background:sel?'#F5FBF7':'#fff'}}><span style={{fontSize:'22px'}}>{a.icon}</span><span style={{fontSize:'15px',fontWeight:'500',color:sel?'#2D7A4F':'#6F6F6F'}}>{en?a.labelEn:a.label}</span></div>)})}</div><button style={S.btn} onClick={join}>{selectedAllergies.length?(en?'Done, join queue':'Listo, anotarme'):(en?'No allergies, join queue':'No tengo, anotarme')}</button></div>);
      if(step==='waiting'){const pct=position?Math.max(0,Math.min(100,((10-position)/10)*100)):0;return(<div style={S.page}><h1 style={S.h1}>{en?'Your wait':'Tu espera'}</h1><p style={{...S.sub,marginBottom:'16px'}}>Chuí</p><div style={{display:'flex',justifyContent:'center',margin:'8px 0 16px'}}><div style={{width:'148px',height:'148px',borderRadius:'50%',background:`conic-gradient(#2D7A4F ${pct}%,#EBEBEB ${pct}%)`,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{width:'128px',height:'128px',borderRadius:'50%',background:'#F6F6F4',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>{status==='notified'?<><div style={{fontSize:'28px'}}>🪑</div><div style={{fontSize:'14px',color:'#2D7A4F',fontWeight:'600'}}>¡Tu mesa!</div></>:<><div style={{fontSize:'44px',fontWeight:'700'}}>{position||'—'}°</div><div style={{fontSize:'13px',color:'#9B9B9B'}}>{en?'in line':'en la fila'}</div></>}</div></div></div>{wait&&status!=='notified'&&<div style={{...S.card,textAlign:'center'}}><label style={S.lbl}>{en?'Estimated wait':'Espera estimada'}</label><div style={{fontSize:'36px',fontWeight:'700'}}>~{wait} min</div></div>}{status==='waiting'&&<div style={{...S.card,background:'#FDF6EF',border:'1px solid #ECD9C5',padding:'18px'}}><div style={{display:'flex',alignItems:'center',gap:'14px',marginBottom:'12px'}}><div style={{width:'48px',height:'48px',borderRadius:'14px',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px'}}>🍸</div><div><div style={{fontSize:'16px',fontWeight:'600'}}>¿Preferís esperar en la barra?</div></div></div><div style={{background:'#fff',borderRadius:'12px',padding:'14px 16px',border:'1px solid #ECD9C5',display:'flex',alignItems:'center',gap:'12px'}}><span style={{fontSize:'22px'}}>💬</span><div style={{flex:1}}><div style={{fontSize:'14px',fontWeight:'600',color:'#C4956A'}}>25% off en tu primer trago</div><div style={{fontSize:'13px',color:'#6F6F6F'}}>Registrate con WhatsApp</div></div></div></div>}<div style={{display:'flex',gap:'10px'}}><div onClick={()=>setShowMenu(true)} style={{...S.card,flex:1,textAlign:'center',padding:'16px',cursor:'pointer'}}><div style={{fontSize:'20px'}}>📖</div><div style={{fontSize:'14px',fontWeight:'500',marginTop:'6px'}}>Ver menú</div></div></div>{status!=='notified'&&<div style={{textAlign:'center',marginTop:'16px'}}><button onClick={cancel} style={{...S.link,color:'#DA3743',opacity:0.6}}>Cancelar mi lugar</button></div>}{showMenu&&<MenuOverlay onClose={()=>setShowMenu(false)}/>}</div>)}
      if(step==='done'){typeof window!=='undefined'&&localStorage.removeItem('mesa_entry_id');return(<div style={S.center}><div style={S.card}><div style={{fontSize:'44px',marginBottom:'12px'}}>🎉</div><h1 style={S.h1}>¡Gracias por venir!</h1><p style={S.body}>Esperamos que hayas disfrutado.</p></div></div>)}
      return null}
      APPEOF

  - name: Create menu overlay and API
    run: |
      cat > src/components/MenuOverlay.js << 'COMPEOF'
      'use client';
      import{useState}from'react';import{MENU,MENU_TABS_ES,MENU_TABS_EN,MENU_TAB_LABELS,TAG_COLORS,getMenuKey,isEnglish}from'@/lib/menu-data';
      export default function MenuOverlay({onClose}){const en=isEnglish();const tabs=en?MENU_TABS_EN:MENU_TABS_ES;const[active,setActive]=useState(getMenuKey());const menu=MENU[active];
      return(<div onClick={onClose} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,0.5)',backdropFilter:'blur(4px)',display:'flex',flexDirection:'column'}}><div onClick={e=>e.stopPropagation()} style={{margin:'40px 8px 8px',flex:1,borderRadius:'20px',overflow:'hidden',background:'#fff',display:'flex',flexDirection:'column'}}><div style={{padding:'16px 20px 0',borderBottom:'1px solid #EBEBEB'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}><div style={{fontSize:'18px',fontWeight:'700'}}>📖 {en?'Menu':'Menú'}</div><button onClick={onClose} style={{width:'32px',height:'32px',borderRadius:'50%',background:'#F6F6F4',border:'none',cursor:'pointer',fontSize:'16px',color:'#6F6F6F',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div><div style={{display:'flex',gap:'4px',overflowX:'auto'}}>{tabs.map(k=>(<button key={k} onClick={()=>setActive(k)} style={{padding:'8px 14px',background:'none',border:'none',cursor:'pointer',fontSize:'13px',fontWeight:active===k?'700':'500',color:active===k?'#2D7A4F':'#9B9B9B',borderBottom:active===k?'2.5px solid #2D7A4F':'2.5px solid transparent',marginBottom:'-1px',whiteSpace:'nowrap'}}>{MENU_TAB_LABELS[k]}</button>))}</div></div><div style={{flex:1,overflow:'auto',padding:'16px 20px'}}>{menu.sections.map((sec,si)=>(<div key={si} style={{marginBottom:'24px'}}><div style={{fontSize:'18px',fontWeight:'700',marginBottom:sec.s?'2px':'12px'}}>{sec.t}</div>{sec.s&&<div style={{fontSize:'12px',color:'#9B9B9B',marginBottom:'12px',textTransform:'uppercase',letterSpacing:'0.5px'}}>{sec.s}</div>}{sec.items.map((item,ii)=>(<div key={ii} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:ii<sec.items.length-1?'1px solid #EBEBEB':'none'}}><div style={{flex:1,paddingRight:'12px'}}><div style={{fontSize:'15px',lineHeight:1.4}}>{item.n}</div>{item.g.length>0&&<div style={{display:'flex',gap:'4px',marginTop:'4px',flexWrap:'wrap'}}>{item.g.map(tag=>{const tc=TAG_COLORS[tag]||{bg:'#f0f0f0',c:'#6F6F6F'};return<span key={tag} style={{fontSize:'11px',fontWeight:'600',padding:'2px 7px',borderRadius:'6px',background:tc.bg,color:tc.c}}>{tag}</span>})}</div>}</div><div style={{textAlign:'right',whiteSpace:'nowrap'}}>{item.x&&<span style={{fontSize:'11px',color:'#9B9B9B',marginRight:'4px'}}>{item.x}</span>}<span style={{fontSize:'15px',fontWeight:'600'}}>${item.p.toLocaleString()}</span>{item.p2&&<span style={{fontSize:'13px',color:'#9B9B9B'}}> / ${item.p2.toLocaleString()}</span>}</div></div>))}</div>))}</div></div></div>)}
      COMPEOF

      cat > src/app/api/waitlist/route.js << 'APIEOF'
      import{supabase}from'@/lib/supabase';import{NextResponse}from'next/server';
      export async function GET(){const{data,error}=await supabase.from('waitlist').select('*').in('status',['waiting','notified','extended']).order('joined_at',{ascending:true});if(error)return NextResponse.json({error:error.message},{status:500});return NextResponse.json(data)}
      export async function POST(req){const body=await req.json();const{guest_name,party_size,allergies}=body;let cid=null;if(guest_name){const{data:ex}=await supabase.from('customers').select('id,visit_count').ilike('name',guest_name).limit(1).single();if(ex){cid=ex.id;await supabase.from('customers').update({visit_count:ex.visit_count+1,last_visit:new Date().toISOString(),...(allergies?{allergies}:{})}).eq('id',ex.id)}else{const{data:nc}=await supabase.from('customers').insert({name:guest_name,allergies:allergies||[],visit_count:1,last_visit:new Date().toISOString()}).select('id').single();if(nc)cid=nc.id}}const{data,error}=await supabase.from('waitlist').insert({customer_id:cid,guest_name,party_size:party_size||2,source:'qr'}).select('id').single();if(error)return NextResponse.json({error:error.message},{status:500});return NextResponse.json({id:data.id,customer_id:cid})}
      export async function PATCH(req){const{id,action,extra_minutes}=await req.json();let u={};switch(action){case'notify':u={status:'notified',notified_at:new Date().toISOString()};break;case'seat':u={status:'seated',seated_at:new Date().toISOString()};break;case'cancel':u={status:'cancelled',cancelled_at:new Date().toISOString()};break;case'no_show':u={status:'no_show'};break;default:return NextResponse.json({error:'Unknown'},{status:400})}const{error}=await supabase.from('waitlist').update(u).eq('id',id);if(error)return NextResponse.json({error:error.message},{status:500});return NextResponse.json({ok:true})}
      APIEOF

      cat > src/app/host/page.js << 'HOSTEOF'
      'use client';
      import{useState,useEffect}from'react';import{supabase}from'@/lib/supabase';
      export default function HostPage(){const[queue,setQueue]=useState([]);const[stats,setStats]=useState({seated:0,cancelled:0,avgWait:0});
      const fetch_q=async()=>{const{data}=await supabase.from('waitlist').select('*,customers(name,allergies,visit_count,trust_level)').in('status',['waiting','notified','extended']).order('joined_at',{ascending:true});if(data)setQueue(data)};
      const fetch_s=async()=>{const t=new Date().toISOString().split('T')[0];const{data}=await supabase.from('waitlist').select('status,joined_at,seated_at').gte('joined_at',t+'T00:00:00');if(data){const s=data.filter(e=>e.status==='seated');const avg=s.length?Math.round(s.reduce((a,e)=>a+(new Date(e.seated_at)-new Date(e.joined_at))/60000,0)/s.length):0;setStats({seated:s.length,cancelled:data.filter(e=>e.status==='cancelled').length,avgWait:avg})}};
      useEffect(()=>{fetch_q();fetch_s();const ch=supabase.channel('host').on('postgres_changes',{event:'*',schema:'public',table:'waitlist'},()=>{fetch_q();fetch_s()}).subscribe();return()=>supabase.removeChannel(ch)},[]);
      const act=async(id,a)=>{await fetch('/api/waitlist',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,action:a})})};
      const ago=ts=>Math.round((Date.now()-new Date(ts))/60000);
      const lv={0:{l:'Nuevo',bg:'#F0F0F0',c:'#6F6F6F'},1:{l:'Verificado',bg:'#EDF4FA',c:'#5B8DB8'},2:{l:'Confiable',bg:'#E8F5EE',c:'#2D7A4F'},3:{l:'★ Habitual',bg:'#FDF6EF',c:'#C4956A'}};
      const sm={waiting:{l:'Esperando',bg:'#F0F0F0',c:'#6F6F6F'},notified:{l:'Notificado',bg:'#E8F5EE',c:'#2D7A4F'},extended:{l:'Extendido',bg:'#FFF8F0',c:'#D4842A'}};
      return(<div style={{minHeight:'100vh',background:'#F6F6F4',paddingBottom:'40px'}}><div style={{padding:'56px 20px 0'}}><div style={{display:'flex',justifyContent:'space-between'}}><div><h1 style={{fontSize:'28px',fontWeight:'700',margin:0}}>Chuí</h1><p style={{fontSize:'14px',color:'#6F6F6F',margin:'4px 0'}}>{queue.length} en espera</p></div><div style={{display:'flex',alignItems:'center',gap:'6px'}}><div style={{width:'8px',height:'8px',borderRadius:'50%',background:'#2D7A4F'}}/><span style={{fontFamily:'Georgia,serif',fontSize:'20px'}}>Mesa</span></div></div></div><div style={{padding:'16px 20px'}}>{queue.length===0&&<div style={{textAlign:'center',padding:'60px 20px',color:'#9B9B9B'}}><div style={{fontSize:'48px',marginBottom:'12px'}}>🪑</div><p>No hay nadie en espera</p></div>}{queue.map((e,i)=>{const cu=e.customers;const l=lv[cu?.trust_level||0];const s=sm[e.status]||sm.waiting;const al=cu?.allergies||[];return(<div key={e.id} style={{background:'#fff',borderRadius:'16px',padding:'16px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:'12px'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:'10px'}}><div style={{display:'flex',alignItems:'center',gap:'12px',flex:1}}><div style={{width:'32px',height:'32px',borderRadius:'50%',background:'#F6F6F4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',fontWeight:'700',color:'#6F6F6F'}}>{i+1}</div><div><div style={{display:'flex',alignItems:'center',gap:'8px'}}><span style={{fontWeight:'600',fontSize:'16px'}}>{e.guest_name}</span><span style={{padding:'4px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:'600',background:l.bg,color:l.c}}>{l.l}</span></div><div style={{fontSize:'13px',color:'#6F6F6F',marginTop:'3px'}}>{e.party_size} pers · hace {ago(e.joined_at)} min{al.length>0&&<span style={{color:'#D4842A',fontWeight:'600'}}> · ⚠️ {al.join(', ')}</span>}</div></div></div><span style={{padding:'4px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:'600',background:s.bg,color:s.c,whiteSpace:'nowrap'}}>{s.l}</span></div><div style={{display:'flex',justifyContent:'flex-end',gap:'8px'}}>{e.status==='waiting'&&<button onClick={()=>act(e.id,'notify')} style={{padding:'8px 18px',background:'#F6F6F4',border:'1.5px solid #EBEBEB',borderRadius:'10px',fontSize:'13px',fontWeight:'600',cursor:'pointer'}}>Notificar</button>}{(e.status==='notified'||e.status==='extended')&&<button onClick={()=>act(e.id,'seat')} style={{padding:'8px 18px',background:'#2D7A4F',border:'none',borderRadius:'10px',color:'#fff',fontSize:'13px',fontWeight:'600',cursor:'pointer'}}>Sentar</button>}<button onClick={()=>act(e.id,'no_show')} style={{padding:'8px 18px',background:'transparent',border:'1.5px solid #EBEBEB',borderRadius:'10px',color:'#9B9B9B',fontSize:'13px',fontWeight:'600',cursor:'pointer'}}>No-show</button></div></div>)})}</div><div style={{padding:'0 20px'}}><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>{[{l:'Espera prom.',v:`${stats.avgWait||'—'} min`},{l:'Sentados',v:stats.seated},{l:'En fila',v:queue.length},{l:'Cancelados',v:stats.cancelled}].map(s=>(<div key={s.l} style={{background:'#fff',borderRadius:'16px',padding:'18px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',textAlign:'center'}}><div style={{fontSize:'24px',fontWeight:'700'}}>{s.v}</div><div style={{fontSize:'13px',color:'#9B9B9B',marginTop:'4px'}}>{s.l}</div></div>))}</div></div></div>)}
      HOSTEOF

