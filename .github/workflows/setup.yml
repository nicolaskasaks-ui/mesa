name: Setup Mesa App
on: push
jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          mkdir -p public src/app/api/waitlist src/app/host src/lib src/components
          echo '{"name":"mesa-app","private":true,"scripts":{"dev":"next dev","build":"next build","start":"next start"},"dependencies":{"next":"latest","react":"latest","react-dom":"latest","@supabase/supabase-js":"^2.39.0"}}' > package.json
          echo 'module.exports={reactStrictMode:true};' > next.config.js
          echo '{"compilerOptions":{"paths":{"@/*":["./src/*"]}}}' > jsconfig.json
          printf 'node_modules/\n.next/\n.env.local\n' > .gitignore
          echo '{"name":"Mesa","short_name":"Mesa","start_url":"/","display":"standalone","theme_color":"#2D7A4F"}' > public/manifest.json
          echo "Done"
      - name: Push
        run: |
          rm -f .github/workflows/setup.yml
          git config user.name "Bot"
          git config user.email "bot@mesa.app"
          git add -A
          git commit -m "Mesa base" || true
          git push
