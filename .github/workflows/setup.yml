[{t:"Small Plates",items:[{n:"Wood-fired sourdough focaccia",p:3300,g:["V"]},{n:"Tomato & watermelon gazpachito",p:6500,g:["V","S","GF"]},{n:"Mushroom pâté, pickled celery",p:8900,g:["V","GF"]},{n:"Charred avocado, kimchi",p:11700,g:["V","S","GF"]},{n:"Greens salad, yellow chilli vinaigrette",p:10500,g:["V","GF"]},{n:"Fried corn tortilla, smoked watermelon",p:9800,g:["V","GF"]},{n:"Burnt Llanero cheese, fruit vinegar",p:8500,p2:14200,g:["GF"]},{n:"Heirloom tomatoes, red onion, evoo",p:9800,g:["V","GF"]},{n:"Fried yellow corn, garlic butter, tajin",p:8900,g:["S","GF"]}]},{t:"Plates",items:[{n:"Grilled white polenta, heirloom tomato, feta",p:23700,g:["GF"]},{n:"Smoked eggplant omelette, burnt aioli",p:18900,g:["S","GF"]},{n:"Pommes Anna, stracciatella, black garlic",p:25700,g:["GF"]},{n:"Wood-fired faina, pickled chilli",p:21900,g:["V","GF"]},{n:"Ajilli Lion's mane, korean salad",p:28700,g:["V","S","GF"]}]},{t:"Pizza",s:"48hs fermentation",items:[{n:"Fugazzeta",p:20500,g:[]},{n:"Sweet potato, mushrooms, pesto",p:24000,g:["V"]},{n:"Marinara",p:20000,g:["V","S"]},{n:"Margherita",p:24000,g:[]},{n:"Four cheese",p:24000,g:[]}]},{t:"Sweet",items:[{n:"Butterscotch",p:8500,g:["GF"]},{n:"Mango pastry cream, honeycrumb",p:9800,g:["GF"]},{n:"Chocolate mousse, red berries",p:12000,g:["V","GF"]},{n:"Basque cake, jalapeño jam",p:12700,g:["S","GF"]}]}]},wines:{sections:[{t:"Blancos & Naranjos",items:[{n:"Laborum, Torrontés 2024",p:39200,g:[]},{n:"Eléctrico, Sauv Blanc 2024",p:38500,g:[]},{n:"Antro, Chardonnay 2025",p:28000,g:[]},{n:"El Raro, Sauvignon Blanc 2024",p:48000,g:[]},{n:"Polígonos, Semillón 2024",p:49000,g:[]},{n:"Contra Corriente, Chardonnay 2022",p:54000,g:[]},{n:"Livverá, Naranjo Malvasía 2024",p:42900,g:[]},{n:"Verum, Naranjo 2024",p:37800,g:[]},{n:"Solito Va, Naranjo 2025",p:37500,g:[]}]},{t:"Tintos",items:[{n:"Les Astronautes, Malbec 2025",p:29500,g:[]},{n:"Nat Cool, Bonarda 2022",p:32800,g:[]},{n:"Ribera del Cuarzo, Merlot 2022",p:43800,g:[]},{n:"Negra Margen, Bonarda 2023",p:35000,g:[]},{n:"Cara Sur, Criolla Chica 2023",p:54000,g:[]},{n:"Elephant Gun, Malbec 2024",p:24500,g:[]},{n:"Finca La Catalina, Pinot Noir 2024",p:43500,g:[]},{n:"Chacra 55, Pinot Noir 2024",p:128000,g:[]},{n:"A Lisa, Malbec 2023",p:64000,g:[]}]},{t:"Rosados",items:[{n:"La Imaginación al Poder, Merlot 2024",p:39000,g:[]},{n:"Humberto Canale, Rosé Noir 2025",p:30000,g:[]},{n:"Inconsciente, Merlot Rosé 2025",p:25800,g:[]},{n:"Rocamadre, Pinot Noir 2024",p:37800,g:[]}]},{t:"Espumosos",items:[{n:"Nox Pet Nat, Malbec 2023",p:43500,g:[]},{n:"Alma 4, Pinot Noir - Chardonnay 2021",p:52000,g:[]},{n:"Zuccardi, Blanc de Blancs",p:80000,g:[]}]},{t:"Copas",items:[{n:"De la casa (Bonarda / Rosé / Chardonnay)",p:9000,g:[]},{n:"Del día",p:13500,g:[]},{n:"Sodeado (jarra + soda + hielo)",p:14500,g:[]}]}]},bar:{sections:[{t:"Bar",items:[{n:"Vermut & Aperitivos",p:7000,g:[]},{n:"Penicillin de la casa",p:14500,g:[]},{n:"Fernet Branca",p:9500,g:[]},{n:"Gin Tonic (Beefeater)",p:13500,g:[]},{n:"Spritz (Aperol / Lillet / Ramazzotti)",p:13500,g:[]},{n:"Martini (Seco / Sucio / De la casa)",p:14000,g:[]},{n:"Negroni de Barrica",p:13000,g:[]},{n:"Michelada",p:9800,g:[]},{n:"Bloody Mary",p:16500,g:[]}]},{t:"Cervezas",items:[{n:"Stella Artois Caña / Porrón",p:6000,p2:8000,g:[]},{n:"Corona Porrón",p:8500,g:[]},{n:"Michelob Ultra",p:8500,g:["GF"]},{n:"Stella Artois 0%",p:8000,g:[]},{n:"Corona 0%",p:8500,g:[]}]},{t:"Sin alcohol",items:[{n:"Aguas Aqa",p:2800,g:[]},{n:"Acqua Panna 505ml",p:7300,g:[]},{n:"S. Pellegrino 505ml",p:7300,g:[]},{n:"Coca-Cola",p:4000,g:[]},{n:"Kombucha Ginger Ale",p:8500,g:[]},{n:"Mocktail",p:11000,g:[]}]},{t:"Jugos Cold Press",items:[{n:"Remolacha, manzana, apio, jengibre",p:9500,g:[]},{n:"Naranja, zanahoria, pera, cúrcuma",p:9500,g:[]},{n:"Manzana verde, pepino, espinaca",p:9500,g:[]},{n:"Shot energético",p:4500,g:[]}]},{t:"Café & Infusiones",items:[{n:"Filtrado americano",p:3800,g:[]},{n:"Con leche o leche vegetal",p:4200,g:[]},{n:"Infusión Molle",p:4800,p2:5900,g:[]},{n:"Infusión fría Molle 500cc",p:5500,g:[]}]}]}};
