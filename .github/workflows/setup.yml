name: Setup Mesa App
on: push
jobs:
setup:
runs-on: ubuntu-latest
permissions:
contents: write
steps:
- uses: actions/checkout@v4
- name: Create all project files
run: |
mkdir -p public src/app/api/waitlist src/app/host src/lib src/components

```
      cat > package.json << 'EOF'
      {
        "name": "mesa-app",
        "version": "1.0.0",
        "private": true,
        "scripts": { "dev": "next dev", "build": "next build", "start": "next start" },
        "dependencies": { "next": "latest", "react": "latest", "react-dom": "latest", "@supabase/supabase-js": "^2.39.0" }
      }
      EOF

      cat > next.config.js << 'EOF'
      const nextConfig = { reactStrictMode: true };
      module.exports = nextConfig;
      EOF

      cat > jsconfig.json << 'EOF'
      {"compilerOptions":{"paths":{"@/*":["./src/*"]}}}
      EOF

      printf 'node_modules/\n.next/\n.env.local\n' > .gitignore

      cat > public/manifest.json << 'EOF'
      {"name":"Mesa · Chuí","short_name":"Mesa","start_url":"/","display":"standalone","background_color":"#FFFFFF","theme_color":"#2D7A4F"}
      EOF

      cat > src/lib/supabase.js << 'EOF'
      import { createClient } from '@supabase/supabase-js';
      const u = process.env.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co';
      const k = process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder';
      export const supabase = createClient(u, k);
      EOF

      cat > src/app/globals.css << 'EOF'
      :root{--accent:#2D7A4F;--bg-page:#F6F6F4;--text:#1B1B1B;--text-med:#6F6F6F;--text-light:#9B9B9B;--border:#EBEBEB;--warm:#C4956A;--warm-bg:#FDF6EF;--warm-border:#ECD9C5;--red:#DA3743;--font:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:var(--font);background:var(--bg-page);color:var(--text);-webkit-font-smoothing:antialiased}
      EOF

      cat > src/app/layout.js << 'EOF'
      import './globals.css';
      export const metadata = { title: 'Mesa · Chuí', description: 'Lista de espera inteligente' };
      export default function RootLayout({ children }) {
        return (<html lang="es"><head><meta name="theme-color" content="#2D7A4F"/><link rel="manifest" href="/manifest.json"/></head><body>{children}</body></html>);
      }
      EOF

      echo "Base files done"

  - name: Create menu data
    run: |
      cat > src/lib/menu-data.js << 'MENUEOF'
      export function getMenuKey(){const now=new Date(),h=now.getHours(),day=now.getDay(),lang=(typeof navigator!=="undefined"?navigator.language:"es").toLowerCase(),en=lang.startsWith("en");if(day===0||day===6)return en?"night_en":"night_es";if(h>=12&&h<16)return en?"noon_en":"noon_es";if(h>=16&&h<19)return en?"afternoon_en":"afternoon_es";return en?"night_en":"night_es"}
      export function isEnglish(){if(typeof navigator==="undefined")return false;return navigator.language.toLowerCase().startsWith("en")}
      export const MENU_TABS_ES=["noon_es","afternoon_es","night_es","wines","bar"];
      export const MENU_TABS_EN=["noon_en","afternoon_en","night_en","wines","bar"];
      export const MENU_TAB_LABELS={noon_es:"Mediodía",noon_en:"Noon",afternoon_es:"Tarde",afternoon_en:"Afternoon",night_es:"Noche",night_en:"Evening",wines:"Vinos",bar:"Bebidas"};
      export const TAG_COLORS={V:{bg:"#E8F5EE",c:"#2D7A4F"},"V*":{bg:"#E8F5EE",c:"#2D7A4F"},P:{bg:"#FFF0E0",c:"#D4842A"},S:{bg:"#FFF0E0",c:"#D4842A"},GF:{bg:"#F0ECFF",c:"#7B61C4"}};
      export const ALLERGIES=[{id:"nuts",label:"Frutos secos",labelEn:"Tree nuts",icon:"\u{1F95C}"},{id:"gluten",label:"Gluten",labelEn:"Gluten",icon:"\u{1F33E}"},{id:"dairy",label:"Lácteos",labelEn:"Dairy",icon:"\u{1F95B}"},{id:"egg",label:"Huevo",labelEn:"Egg",icon:"\u{1F95A}"},{id:"soy",label:"Soja",labelEn:"Soy",icon:"\u{1FAD8}"},{id:"vegan",label:"Vegano",labelEn:"Vegan",icon:"\u{1F331}"}];
      export const MENU={noon_es:{sections:[{t:"Platitos",items:[{n:"Focaccia de masa madre a la leña",p:3000,g:["V"]},{n:"Gazpachito de sandía y tomate",p:6500,g:["V"]},{n:"Paté de hongos, pickles de apio",p:8000,g:["V","GF"]},{n:"Palta quemada, kimchi, leche de tigre",p:10500,g:["V","P","GF"]},{n:"Pimientos calahorra, harissa, salvia frita",p:12000,g:["V","P","GF"]},{n:"Queso Llanero, vinagre de frutas",p:8000,p2:13500,g:["GF"]},{n:"Tomates reliquia, cebolla morada, AOVE",p:9500,g:["V","GF"]},{n:"Ensalada de hojas, vinagreta de ají amarillo",p:9200,g:["V","P","GF"]}]},{t:"Platos",items:[{n:"Canelón de ricota, garrapiñada de almendras",p:19200,g:[]},{n:"Fainá a la leña, ají vinagrero",p:18900,g:["V","GF"]},{n:"Milanesa de gírgolas, puré de papas",p:19300,g:[]},{n:"Ñoquis de sémola y queso romel",p:18300,g:[]},{n:"Tacos de gírgolas anticucheras, mole verde",p:17900,g:["V","P","GF"]}]},{t:"Pizza",s:"48hs fermentación",items:[{n:"Fugazzeta",p:20500,g:[]},{n:"Boniato, gírgolas, pesto, cajú",p:22000,g:["V"]},{n:"Marinara",p:19000,g:["V","P"]},{n:"Margherita",p:22000,g:[]},{n:"Cuatro quesos",p:22000,g:[]}]},{t:"Sandwiches",s:"con chips de batata",items:[{n:"Milanesa de gírgolas, mostaza, ketchup, huevo",p:17000,g:["V*"]},{n:"Berenjena, reggianito, alioli ahumado",p:17000,g:["P"]}]},{t:"Dulces",items:[{n:"Butterscotch",p:7500,g:["GF"]},{n:"Pastelera de mango, honeycrumb",p:9800,g:["GF"]},{n:"Mousse de chocolate, frutos rojos",p:12000,g:["V","GF"]},{n:"Carrot cake, glaseado de cajú",p:10500,g:["V","GF"]}]}]},noon_en:{sections:[{t:"Small Plates",items:[{n:"Wood-fired sourdough focaccia",p:3000,g:["V"]},{n:"Tomato & watermelon gazpachito",p:6500,g:["V","S","GF"]},{n:"Mushroom pâté, pickled celery",p:8000,g:["V","GF"]},{n:"Charred avocado, kimchi",p:10500,g:["V","S","GF"]},{n:"Wood-fired calahorra peppers, harissa",p:12000,g:["V","S","GF"]},{n:"Burnt Llanero cheese, fruit vinegar",p:8000,p2:13500,g:["GF"]},{n:"Heirloom tomatoes, red onion, evoo",p:9500,g:["V","S","GF"]},{n:"G